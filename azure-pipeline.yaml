trigger:
  branches:
    include:
      - main

pool:
  name: 'book-review-agent'

stages:
  - stage: DeployApp
    displayName: 'Deploy Application via Ansible'
    jobs:
      - job: App_Deployment
        displayName: 'Run Ansible Playbook'
        steps:

          - script: |
              sudo apt update -qq
              sudo apt install -y ansible sshpass
              ansible --version
            displayName: 'Install Ansible'

          - task: DownloadSecureFile@1
            name: ssh_key
            inputs:
              secureFile: 'epicbook-key'

          - script: |
              mkdir -p ~/.ssh
              cp $(ssh_key.secureFilePath) ~/.ssh/epicbook-key
              chmod 600 ~/.ssh/epicbook-key
            displayName: 'Setup SSH Key'

          - script: |
              cd ansible
              ansible-playbook -i inventory.ini site.yml \
                -e "frontend_ip=20.220.191.102 backend_ip=20.151.172.142 mysql_fqdn=bookreview-db.mysql.database.azure.com" \
                --ssh-extra-args "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            displayName: 'Run Ansible Playbook'
            env:
              ANSIBLE_HOST_KEY_CHECKING: 'False'
